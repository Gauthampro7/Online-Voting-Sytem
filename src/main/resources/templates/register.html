<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Register')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container animate-fade-in" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="glass-panel" style="width: 100%; max-width: 500px;">
            <h2 class="text-center mb-4">Create Account</h2>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="role">Register As</label>
                    <select id="role" th:field="*{role}" class="form-control" required style="background: rgba(15, 32, 39, 0.8);">
                        <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            <p class="text-center mt-4 text-muted">Already have an account? <a th:href="@{/login}" style="color: var(--primary);">Login here</a></p>
        </div>
    </div>
</body>
</html>
