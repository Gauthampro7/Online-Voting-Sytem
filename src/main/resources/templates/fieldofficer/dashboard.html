<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Field Officer Dashboard')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container animate-fade-in">
        <h2 class="mb-4">Field Officer Dashboard</h2>

        <div th:if="${param.success}" class="mb-4 p-4 glass-panel text-center" style="color: var(--secondary);">
            Application approved successfully.
        </div>
        <div th:if="${param.rejected}" class="mb-4 p-4 glass-panel text-center" style="color: var(--danger);">
            Application rejected.
        </div>

        <div class="glass-panel">
            <h3 class="mb-4">Pending Voter Applications</h3>
            
            <div th:if="${#lists.isEmpty(pendingVoters)}">
                <p class="text-muted">No pending applications at the moment.</p>
            </div>

            <div class="table-container" th:if="${not #lists.isEmpty(pendingVoters)}">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Constituency</th>
                            <th>Document ID</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="voter : ${pendingVoters}">
                            <td th:text="${voter.user.name}"></td>
                            <td th:text="${voter.address}"></td>
                            <td th:text="${voter.constituency}"></td>
                            <td th:text="${voter.identityDocumentPath}"></td>
                            <td>
                                <div style="display: flex; gap: 0.5rem;">
                                    <form th:action="@{/field-officer/voters/approve}" method="post">
                                        <input type="hidden" name="profileId" th:value="${voter.id}">
                                        <button type="submit" class="btn btn-success" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">Approve</button>
                                    </form>
                                    <form th:action="@{/field-officer/voters/reject}" method="post">
                                        <input type="hidden" name="profileId" th:value="${voter.id}">
                                        <button type="submit" class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">Reject</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
