<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Live Results')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container animate-fade-in">
        <h2 class="mb-4">Live Election Results</h2>

        <div class="glass-panel">
            <div th:if="${#maps.isEmpty(results)}">
                <p class="text-muted">No data available or no candidates approved yet.</p>
            </div>

            <div th:if="${not #maps.isEmpty(results)}" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Candidate (Party)</th>
                            <th>Total Votes</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry : ${results}">
                            <td th:text="${entry.key}" style="font-weight: 600;"></td>
                            <td th:text="${entry.value}"></td>
                            <td>
                                <div style="width: 100%; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; height: 8px; margin-top: 5px;">
                                    <!-- A visual bar for votes, mock proportion for visual sake -->
                                    <div style="height: 100%; background: var(--primary); border-radius: 4px;" th:styleappend="'width: ' + (${entry.value} * 10 > 100 ? 100 : ${entry.value} * 10) + '%;'"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <a th:href="@{/dashboard}" class="btn glass-panel mt-4" style="display: inline-block;">Back to Dashboard</a>
    </div>
</body>
</html>
