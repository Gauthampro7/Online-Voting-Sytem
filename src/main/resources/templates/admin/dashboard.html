<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Admin Dashboard')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container animate-fade-in">
        <h2 class="mb-4">Administrator Dashboard</h2>

        <div class="grid mb-4">
            <a th:href="@{/admin/candidates}" class="glass-panel text-center" style="text-decoration: none; display: block;">
                <h3>Manage Candidates</h3>
                <p class="text-muted mt-2">Approve or reject candidate applications.</p>
            </a>
            
            <a th:href="@{/admin/results}" class="glass-panel text-center" style="text-decoration: none; display: block;">
                <h3>Live Results</h3>
                <p class="text-muted mt-2">View real-time election statistics.</p>
            </a>
        </div>
        
        <div class="glass-panel mt-4">
            <h3 class="mb-4">Quick Stats overview</h3>
            <p class="text-muted">Select an option above to manage the election process.</p>
        </div>
    </div>
</body>
</html>
