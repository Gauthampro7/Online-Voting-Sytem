<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Forums')}"></head>
<body>
    <nav th:replace="~{layout :: navbar}"></nav>

    <div class="container animate-fade-in">
        <h2 class="mb-4">Discussion Forums</h2>
        
        <div sec:authorize="isAuthenticated()" class="glass-panel mb-4">
            <h3 class="mb-2">Join the Conversation</h3>
            <form th:action="@{/forums/post}" method="post">
                <div class="form-group">
                    <textarea name="content" class="form-control" rows="3" placeholder="Share your thoughts or ask questions..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Post Message</button>
            </form>
        </div>

        <div sec:authorize="!isAuthenticated()" class="glass-panel mb-4 text-center">
            <p>Please <a th:href="@{/login}" style="color: var(--primary);">login</a> to participate in the discussions.</p>
        </div>

        <div class="glass-panel">
            <div th:if="${#lists.isEmpty(posts)}">
                <p class="text-muted text-center">No discussions yet. Be the first to post!</p>
            </div>
            
            <div th:each="post : ${posts}" style="border-bottom: 1px solid var(--glass-border); padding: 1rem 0;">
                <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
                    <h4 th:text="${post.user.name} + ' (' + ${post.user.role} + ')' " style="color: var(--secondary);"></h4>
                    <span th:text="${#temporals.format(post.timestamp, 'dd MMM yyyy, HH:mm')}" class="text-muted" style="font-size: 0.85rem;"></span>
                </div>
                <p th:text="${post.content}" style="line-height: 1.6;"></p>
            </div>
        </div>
    </div>
</body>
</html>
